services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    networks:
      - mlops-network

  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow && 
      mlflow server --host 0.0.0.0 --port 5000 
      --backend-store-uri /mlflow/mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/mlflow
    networks:
      - mlops-network

networks:
  mlops-network:
    driver: bridge